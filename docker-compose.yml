services:
  frontend:
    build:
      context: ./frontend
      dockerfile: ../docker/frontend.Dockerfile
      target: development
    ports:
      - '4200:4200'
    volumes:
      - ./frontend:/app:rw
      # Volumen nombrado: persiste node_modules entre reinicios del contenedor
      - frontend_node_modules:/app/node_modules
    environment:
      - CHOKIDAR_USEPOLLING=true
      - CHROME_BIN=/usr/bin/chromium
    depends_on:
      - backend
    security_opt:
      - label=disable

  backend:
    build:
      context: ./backend
      dockerfile: ../docker/backend.Dockerfile
      target: development
    ports:
      - '3000:3000'
    volumes:
      - ./backend:/app:rw
      - backend_node_modules:/app/node_modules
    depends_on:
      db:
        condition: service_healthy
    environment:
      - DB_HOST=db
      - DB_PORT=5432
      - DB_USER=${POSTGRES_USER}
      - DB_PASS=${POSTGRES_PASSWORD}
      - DB_NAME=${POSTGRES_DB}
      - JWT_SECRET=${JWT_SECRET:-your-jwt-secret-change-me}
      - JWT_REFRESH_SECRET=${JWT_REFRESH_SECRET:-your-refresh-secret-change-me}
      - GOD_MODE_TOKEN=${GOD_MODE_TOKEN:-change-me-very-strong}
      - NODE_ENV=development
      - FRONTEND_URL=${FRONTEND_URL:-http://localhost:4200}
    command: sh -lc "npm install --no-audit --no-fund && npm run start:dev"
    security_opt:
      - label=disable

  db:
    image: postgres:16
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data:Z
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}']
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  frontend_node_modules:
  backend_node_modules:
