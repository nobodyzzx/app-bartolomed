<div class="flex flex-col items-center justify-center py-16 px-6 text-center">
  <div class="w-20 h-20 rounded-full bg-slate-100 flex items-center justify-center mb-5">
    <span class="material-symbols-outlined msz-40 text-slate-400">{{ icon }}</span>
  </div>
  <p class="text-lg font-semibold text-slate-700 mb-2">{{ title }}</p>
  <p *ngIf="subtitle" class="text-sm text-slate-400 max-w-sm mb-6">{{ subtitle }}</p>
  <button
    *ngIf="actionLabel"
    type="button"
    (click)="action.emit()"
    class="inline-flex items-center gap-2 px-5 h-11 rounded-full font-medium bg-blue-600 text-white hover:bg-blue-700 shadow-md hover:shadow-lg focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-blue-400 focus-visible:ring-offset-1 transition-all border-0"
  >
    {{ actionLabel }}
  </button>
</div>
