<div class="flex items-center gap-3 flex-wrap">
  <div class="flex-1 min-w-56 max-w-md relative">
    <input
      type="text"
      [value]="value"
      (input)="onInput($any($event.target).value)"
      [placeholder]="placeholder"
      class="w-full h-11 rounded-full bg-blue-50 px-5 pr-12 text-slate-900 placeholder-blue-400/70 shadow-md hover:bg-blue-100 hover:shadow-lg focus:outline-none focus:ring-2 focus:ring-blue-200 focus:ring-offset-1 focus:bg-white transition border-0"
    />
    <span class="material-symbols-outlined absolute right-4 top-1/2 -translate-y-1/2 text-blue-400 msz-18 pointer-events-none">
      search
    </span>
  </div>

  <!-- Slot para filtros adicionales (pill buttons, selects, etc.) -->
  <ng-content></ng-content>

  <!-- Botón limpiar -->
  <button
    *ngIf="showClear && value"
    type="button"
    (click)="clear()"
    class="inline-flex items-center gap-1.5 px-4 h-9 rounded-full text-sm font-medium bg-slate-100 text-slate-600 hover:bg-slate-200 transition-all border-0 flex-shrink-0"
  >
    <span class="material-symbols-outlined msz-16">close</span>
    Limpiar
  </button>
</div>
