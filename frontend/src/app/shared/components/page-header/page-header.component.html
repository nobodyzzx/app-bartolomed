<div class="flex items-center justify-between mb-10">
  <div class="flex items-center gap-4">
    <button
      *ngIf="showBack"
      type="button"
      (click)="back.emit()"
      class="inline-flex items-center justify-center w-11 h-11 rounded-full bg-blue-50 text-blue-600 hover:bg-blue-100 hover:text-blue-700 shadow-md hover:shadow-lg focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-blue-200 focus-visible:ring-offset-1 transition-all border-0 flex-shrink-0"
      aria-label="Volver"
    >
      <span class="material-symbols-outlined msz-20 leading-none">arrow_back</span>
    </button>
    <div>
      <h1 class="text-3xl md:text-4xl font-bold text-slate-900 mb-0.5 leading-tight">{{ title }}</h1>
      <p *ngIf="subtitle" class="text-slate-500 text-sm">{{ subtitle }}</p>
    </div>
  </div>

  <!-- Slot para botones de acción (lado derecho) -->
  <div class="flex items-center gap-3">
    <ng-content></ng-content>
  </div>
</div>
