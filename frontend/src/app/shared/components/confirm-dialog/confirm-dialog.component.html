<div class="p-6" style="min-width: 360px; max-width: 480px;">

  <!-- Icon + Title -->
  <div class="flex items-start gap-4 mb-4">
    <div class="w-10 h-10 rounded-full flex items-center justify-center flex-shrink-0"
      [ngClass]="data.isDestructive ? 'bg-red-100 text-red-600' : 'bg-blue-100 text-blue-600'">
      <span class="material-symbols-outlined" style="font-size:20px">
        {{ data.isDestructive ? 'warning' : 'help' }}
      </span>
    </div>
    <div>
      <h2 class="text-lg font-semibold text-slate-900 m-0 leading-snug">{{ data.title }}</h2>
      <p class="text-sm text-slate-500 mt-1 mb-0 leading-relaxed">{{ data.message }}</p>
    </div>
  </div>

  <!-- Actions -->
  <div class="flex items-center justify-end gap-3 pt-4 border-t border-slate-100">
    <button
      type="button"
      (click)="onCancel()"
      class="inline-flex items-center gap-2 px-5 h-10 rounded-full font-medium text-slate-600 bg-slate-100 hover:bg-slate-200 transition-colors border-0 text-sm cursor-pointer"
    >
      {{ data.cancelText || 'Cancelar' }}
    </button>
    <button
      type="button"
      (click)="onConfirm()"
      class="inline-flex items-center gap-2 px-5 h-10 rounded-full font-medium shadow-sm hover:shadow-md transition-all border-0 text-sm cursor-pointer"
      [ngClass]="data.isDestructive
        ? 'bg-red-600 text-white hover:bg-red-700'
        : 'bg-blue-600 text-white hover:bg-blue-700'"
    >
      {{ data.confirmText || 'Confirmar' }}
    </button>
  </div>

</div>
