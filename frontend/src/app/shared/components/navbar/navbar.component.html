<mat-toolbar class="!bg-blue-50 border-b border-blue-200 !shadow-sm !px-4">
  <div class="flex items-center w-full gap-3 h-16">

    <!-- Izquierda: hamburguesa + logo -->
    <div class="flex items-center gap-2 flex-shrink-0">
      <button
        mat-icon-button
        (click)="toggleSidenav()"
        [attr.aria-label]="isExpanded() ? 'Cerrar menú lateral' : 'Abrir menú lateral'"
        [attr.aria-expanded]="isExpanded()"
        class="!text-slate-600 hover:!bg-slate-100"
      >
        <mat-icon>{{ isExpanded() ? 'close' : 'menu' }}</mat-icon>
      </button>

      <img
        class="max-h-9 object-contain"
        src="assets/images/logo-horizontal-bartolomed.webp"
        width="160"
        height="36"
        alt="Bartolomed"
      />
    </div>

    <div class="flex-grow"></div>

    <!-- Derecha: selector de clínica + usuario -->
    <div class="flex items-center gap-2">

      <!-- Clinic Selector -->
      <button
        mat-button
        [matMenuTriggerFor]="clinicMenu"
        class="clinic-selector-button !text-slate-700 !normal-case !rounded-lg !px-3"
        [disabled]="isClinicsLoading || hasNoClinics()"
      >
        <span class="flex items-center gap-1.5">
          <span class="material-symbols-outlined msz-18 text-blue-500">apartment</span>
          <span class="hidden sm:inline text-sm font-medium max-w-[200px] truncate">{{ getSelectedClinicName() }}</span>
          <span class="material-symbols-outlined msz-16 text-slate-400">expand_more</span>
        </span>
      </button>

      <mat-menu #clinicMenu="matMenu" class="clinic-menu" xPosition="before" (closed)="resetClinicSearch()">
        <!-- Búsqueda (solo si hay más de 5 clínicas) -->
        <div
          *ngIf="showClinicSearch"
          class="px-4 py-3 border-b border-slate-200 bg-slate-50"
          (click)="$event.stopPropagation()"
        >
          <div class="flex items-center gap-2 bg-white rounded-lg px-3 py-2 border border-slate-200">
            <span class="material-symbols-outlined msz-16 text-slate-400">search</span>
            <input
              type="text"
              placeholder="Buscar clínica..."
              class="flex-1 text-sm outline-none border-none bg-transparent text-slate-700"
              [(ngModel)]="clinicSearchTerm"
              (ngModelChange)="onClinicSearchChange($event)"
            />
          </div>
        </div>

        <!-- Super Admin: Ver todas las clínicas -->
        <button
          *ngIf="isSuperAdmin()"
          mat-menu-item
          (click)="onClinicChange(null)"
          class="!min-h-[44px]"
          [class.!bg-blue-50]="!selectedClinicId"
        >
          <span class="flex items-center gap-2">
            <span class="material-symbols-outlined msz-18"
              [class.text-blue-600]="!selectedClinicId"
              [class.text-slate-400]="selectedClinicId"
            >domain</span>
            <span class="text-sm" [class.font-medium]="!selectedClinicId" [class.text-blue-700]="!selectedClinicId">
              Todas las clínicas
            </span>
            <span *ngIf="!selectedClinicId" class="material-symbols-outlined msz-16 text-blue-500 ml-auto">check</span>
          </span>
        </button>

        <mat-divider *ngIf="isSuperAdmin()" class="!my-1"></mat-divider>

        <!-- Lista de clínicas -->
        <button
          mat-menu-item
          *ngFor="let clinic of filteredClinics; trackBy: trackClinicById"
          (click)="onClinicChange(clinic.id)"
          class="!min-h-[52px]"
          [class.!bg-blue-50]="clinic.id === selectedClinicId"
        >
          <div class="flex items-center gap-3 py-0.5">
            <span class="material-symbols-outlined msz-18"
              [class.text-blue-600]="clinic.id === selectedClinicId"
              [class.text-slate-400]="clinic.id !== selectedClinicId"
            >apartment</span>
            <div class="flex flex-col flex-1 min-w-0">
              <span class="text-sm truncate"
                [class.font-semibold]="clinic.id === selectedClinicId"
                [class.text-blue-800]="clinic.id === selectedClinicId"
                [class.text-slate-800]="clinic.id !== selectedClinicId"
              >{{ clinic.name }}</span>
              <span *ngIf="clinic.address" class="text-xs text-slate-400 truncate">{{ clinic.address }}</span>
            </div>
            <span *ngIf="clinic.id === selectedClinicId" class="material-symbols-outlined msz-16 text-blue-500">check</span>
          </div>
        </button>

        <div *ngIf="filteredClinics.length === 0 && clinicSearchTerm" class="px-4 py-3 text-center text-slate-400 text-sm italic">
          Sin resultados para "{{ clinicSearchTerm }}"
        </div>
        <div *ngIf="hasNoClinics()" class="px-4 py-3 text-center text-amber-600 text-sm">
          No hay clínicas disponibles
        </div>
      </mat-menu>

      <!-- Divider vertical -->
      <div class="w-px h-6 bg-blue-200 mx-1 hidden sm:block"></div>

      <!-- User: nombre + avatar -->
      <div class="flex items-center gap-2.5">
        <!-- Nombre y rol (oculto en pantallas pequeñas) -->
        <div class="hidden md:flex flex-col items-end">
          <span class="text-sm font-semibold text-slate-800 leading-tight">{{ displayName() }}</span>
          <span class="text-xs text-slate-500 leading-tight">{{ userRoleLabel() }}</span>
        </div>

        <!-- Avatar -->
        <button
          [matMenuTriggerFor]="userMenu"
          aria-label="Menú de usuario"
          class="w-9 h-9 rounded-full bg-gradient-to-br from-blue-500 to-blue-700 text-white text-sm font-bold flex items-center justify-center hover:opacity-90 transition-opacity flex-shrink-0 border-0 shadow-sm ring-2 ring-white ring-offset-1 ring-offset-white"
        >
          {{ userInitials() }}
        </button>

        <!-- User Menu -->
        <mat-menu #userMenu="matMenu" xPosition="before">
          <div mat-menu-content class="min-w-[240px]">

            <!-- Header del menú -->
            <div class="px-4 py-3 border-b border-slate-100 bg-slate-50" (click)="$event.stopPropagation()">
              <div class="flex items-center gap-3">
                <div class="w-10 h-10 rounded-full bg-gradient-to-br from-blue-500 to-blue-700 text-white text-sm font-bold flex items-center justify-center flex-shrink-0 shadow-sm">
                  {{ userInitials() }}
                </div>
                <div class="min-w-0 flex-1">
                  <p class="text-sm font-semibold text-slate-900 leading-tight truncate">{{ displayName() }}</p>
                  <p class="text-xs text-slate-500 leading-tight mt-0.5">{{ allRoleLabels() }}</p>
                </div>
              </div>
            </div>

            <!-- Mi Perfil -->
            <button mat-menu-item routerLink="/dashboard/profile">
              <mat-icon class="text-blue-500">manage_accounts</mat-icon>
              <span class="text-sm text-slate-700">Mi Perfil</span>
            </button>

            <mat-divider></mat-divider>

            <!-- Logout -->
            <button mat-menu-item (click)="onLogout()">
              <mat-icon class="text-red-500">logout</mat-icon>
              <span class="text-sm text-red-600">Cerrar Sesión</span>
            </button>

          </div>
        </mat-menu>
      </div>

    </div>
  </div>
</mat-toolbar>
