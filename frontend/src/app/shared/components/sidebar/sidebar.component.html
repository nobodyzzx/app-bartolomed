<nav
  role="navigation"
  aria-label="Menú principal"
  class="fixed top-16 left-0 h-[calc(100vh-4rem)] bg-blue-50 flex flex-col z-40 transition-all duration-300 ease-in-out shadow-lg"
  [ngClass]="{ 'w-72': isExpanded(), 'w-16': !isExpanded() }"
>
  <!-- Items del menú -->
  <div
    class="flex-1 overflow-y-auto overflow-x-hidden pt-3"
    [ngClass]="isExpanded() ? 'px-3 space-y-1' : 'px-2 space-y-2'"
  >
    <sidebar-menu-item
      *ngFor="let menuItem of filteredMenuItems(); trackBy: trackByLabel"
      [item]="menuItem"
      [isExpanded]="isExpanded()"
      [isDemo]="isDemo"
      (demoClick)="onDemoClick()"
    ></sidebar-menu-item>
  </div>

  <!-- Footer: info del usuario -->
  <div class="border-t border-blue-200 bg-blue-100/50 flex-shrink-0"
       [ngClass]="isExpanded() ? 'p-3' : 'py-3 px-2'">
    <ng-container *ngIf="isExpanded(); else collapsedFooter">
      <div class="flex items-center gap-2.5 min-w-0">
        <!-- Avatar -->
        <div class="w-9 h-9 rounded-full bg-gradient-to-br from-blue-500 to-blue-700 text-white flex items-center justify-center text-sm font-bold flex-shrink-0 select-none shadow-sm ring-2 ring-white">
          {{ userInitials() }}
        </div>
        <!-- Info -->
        <div class="min-w-0 flex-1">
          <p class="text-sm font-semibold text-blue-900 truncate leading-tight">{{ userName() }}</p>
          <span class="inline-block mt-0.5 px-2 py-px rounded-full text-[10px] font-semibold tracking-wide bg-blue-200 text-blue-700 uppercase">
            {{ userRoleLabel() }}
          </span>
        </div>
      </div>
    </ng-container>
    <ng-template #collapsedFooter>
      <div class="flex justify-center">
        <div
          class="w-9 h-9 rounded-full bg-gradient-to-br from-blue-500 to-blue-700 text-white flex items-center justify-center text-sm font-bold select-none cursor-default shadow-sm ring-2 ring-white"
          [matTooltip]="userName() + ' — ' + userRoleLabel()"
          matTooltipPosition="right"
        >
          {{ userInitials() }}
        </div>
      </div>
    </ng-template>
  </div>
</nav>
