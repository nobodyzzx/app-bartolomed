<nav
  role="navigation"
  aria-label="Menú principal"
  class="fixed top-16 left-0 h-[calc(100vh-4rem)] bg-blue-50 flex flex-col z-40 transition-all duration-300 ease-in-out shadow-lg"
  [ngClass]="{ 'w-72': isExpanded(), 'w-16': !isExpanded() }"
>
  <!-- Items del menú -->
  <div class="flex-1 overflow-y-auto pt-3" [class.px-2]="!isExpanded()" [class.space-y-2]="!isExpanded()">
    <div *ngFor="let menuItem of filteredMenuItems(); trackBy: trackByLabel" [class.space-y-1]="isExpanded()">
      <sidebar-menu-item
        [item]="menuItem"
        [isExpanded]="isExpanded()"
        [isDemo]="isDemo"
        (demoClick)="onDemoClick()"
      ></sidebar-menu-item>
    </div>
  </div>

  <!-- Footer con branding -->
  <div class="mt-auto pb-4 px-2">
    <mat-divider class="my-2"></mat-divider>
    <div class="text-center" *ngIf="isExpanded()">
      <span class="text-sm font-medium text-blue-600">PLATAFORMA DE GESTIÓN CLÍNICA</span>
    </div>
  </div>
</nav>
