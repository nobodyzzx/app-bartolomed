<div class="min-h-screen bg-slate-50 flex flex-col items-center justify-center p-6">

  <!-- Logo / Header -->
  <div class="mb-8 text-center">
    <span class="material-symbols-outlined text-5xl text-blue-600">local_hospital</span>
    <h1 class="mt-3 text-2xl font-bold text-slate-800">Selecciona tu clínica</h1>
    <p class="mt-1 text-sm text-slate-500">Elige el contexto de trabajo para esta sesión</p>
  </div>

  <!-- Loading -->
  <div *ngIf="loading" class="flex items-center gap-3 text-slate-500">
    <mat-spinner diameter="24"></mat-spinner>
    <span>Cargando clínicas...</span>
  </div>

  <!-- Error -->
  <div *ngIf="error && !loading" class="text-center text-red-600">
    <span class="material-symbols-outlined text-4xl">error_outline</span>
    <p class="mt-2">No se pudieron cargar las clínicas. Intenta de nuevo.</p>
    <button mat-flat-button color="primary" class="mt-4" (click)="ngOnInit()">Reintentar</button>
  </div>

  <!-- Sin clínicas -->
  <div *ngIf="!loading && !error && clinics.length === 0" class="text-center text-slate-500 max-w-sm">
    <span class="material-symbols-outlined text-5xl text-slate-300">domain_disabled</span>
    <p class="mt-3 font-medium text-slate-700">Sin clínicas asignadas</p>
    <p class="mt-1 text-sm">Tu cuenta no tiene acceso a ninguna clínica activa. Contacta al administrador.</p>
    <button mat-stroked-button class="mt-6" (click)="logout()">Cerrar sesión</button>
  </div>

  <!-- Lista de clínicas -->
  <div *ngIf="!loading && clinics.length > 1" class="w-full max-w-md space-y-3">
    <button
      *ngFor="let clinic of clinics"
      type="button"
      (click)="selectClinic(clinic)"
      class="w-full flex items-center gap-4 p-4 bg-white rounded-xl border border-slate-200 hover:border-blue-400 hover:shadow-md transition-all text-left group"
    >
      <div class="w-11 h-11 rounded-full bg-blue-100 text-blue-600 flex items-center justify-center flex-shrink-0">
        <span class="material-symbols-outlined">business</span>
      </div>
      <div class="flex-1 min-w-0">
        <p class="font-semibold text-slate-800 group-hover:text-blue-700 truncate">{{ clinic.name }}</p>
        <p class="text-sm text-slate-500 truncate">{{ clinic.address }}</p>
      </div>
      <span class="material-symbols-outlined text-slate-300 group-hover:text-blue-500">chevron_right</span>
    </button>

    <div class="pt-4 text-center">
      <button mat-button color="warn" (click)="logout()">Cerrar sesión</button>
    </div>
  </div>

</div>
