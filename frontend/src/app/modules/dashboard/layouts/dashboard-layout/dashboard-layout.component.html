<div class="h-screen flex flex-col">
  <!-- Navbar -->
  <share-navbar></share-navbar>

  <!-- Backdrop mobile: visible solo en pantallas pequeñas cuando el sidebar está abierto -->
  <div
    *ngIf="isExpanded()"
    class="fixed inset-0 top-16 bg-black/40 z-30 md:hidden"
    (click)="closeSidebar()"
    aria-hidden="true"
  ></div>

  <!-- Contenedor principal -->
  <div class="flex-1 flex overflow-hidden">
    <!-- Espacio reservado para el sidebar (solo en md+) -->
    <div
      [ngClass]="{'md:w-72': isExpanded(), 'md:w-16': !isExpanded()}"
      class="w-0 transition-all duration-300 ease-in-out flex-shrink-0"
    >
      <shared-sidebar></shared-sidebar>
    </div>

    <!-- Contenido principal -->
    <div class="flex-1 p-6 h-full overflow-auto">
      <router-outlet></router-outlet>
    </div>
  </div>
</div>
